apiVersion: v1
kind: Service
metadata:
  name: {{ include "dclaw-lease.fullname" . }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 8000
      protocol: TCP
  selector:
    app.kubernetes.io/name: {{ include "dclaw-lease.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
